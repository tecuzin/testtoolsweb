services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agri_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agri_demo']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agri_demo
      ENABLE_TEST_RESET: 'true'
      SEED_ON_STARTUP: 'false'
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '4200:80'
    depends_on:
      backend:
        condition: service_healthy

  e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    environment:
      FRONT_URL: http://frontend
      API_URL: http://backend:3000/api
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    profiles: ['tests']

  report:
    build:
      context: .
      dockerfile: reports/Dockerfile
    ports:
      - '8501:8501'
    volumes:
      - ./reports:/app/reports

volumes:
  pg_data:
