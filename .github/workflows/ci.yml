name: CI

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']
  workflow_dispatch:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run demo:test:all-local

      - name: Build
        run: npm run build

  e2e-docker-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E stack in Docker
        run: docker compose --profile tests up --build --abort-on-container-exit --exit-code-from e2e e2e

      - name: Collect Docker logs
        if: always()
        run: docker compose logs --no-color > e2e-docker.log

      - name: Upload E2E Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docker-logs
          path: e2e-docker.log

      - name: Shutdown Docker stack
        if: always()
        run: docker compose down -v
